{{define "home.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{.MetaTitle | default .SiteName}}</title>
    {{MetaTags .MetaTitle .MetaDescription .OGImage .CanonicalURL}}
</head>
<body style="font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px;">
    <h1>{{.SiteName}}</h1>
    <ul>
    {{range .Content}}
    <li><a href="/posts/{{.Slug}}">{{.Title}}</a> - {{.Excerpt}}</li>
    {{end}}
    </ul>
</body>
</html>
{{end}}
